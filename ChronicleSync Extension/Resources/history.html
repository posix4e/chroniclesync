<!DOCTYPE html>
<html>
<head>
  <title>ChronicleSync - History</title>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="history.css">
</head>
<body>
  <div id="history-container">
    <header>
      <h1>ChronicleSync History</h1>
      <div class="controls">
        <input type="text" id="search-input" placeholder="Search history...">
        <button id="search-button">Search</button>
        <button id="refresh-button">Refresh</button>
      </div>
    </header>
    
    <div class="filters">
      <div class="filter-group">
        <label for="device-filter">Device:</label>
        <select id="device-filter">
          <option value="all">All Devices</option>
        </select>
      </div>
      <div class="filter-group">
        <label for="date-filter">Date:</label>
        <select id="date-filter">
          <option value="all">All Time</option>
          <option value="today">Today</option>
          <option value="yesterday">Yesterday</option>
          <option value="week">This Week</option>
          <option value="month">This Month</option>
        </select>
      </div>
    </div>
    
    <div id="history-list">
      <div class="loading">Loading history...</div>
    </div>
    
    <div id="no-results" class="hidden">No history items found.</div>
  </div>
  
  <script src="ChromeExtensionCompatibility.js"></script>
  <script src="history.js"></script>
</body>
</html>
